{% for run in runs %}
<tr class="status-{{ run.status }}">
  <td>{{ run.pipeline_name }}</td>
  <td>{{ run.timestamp }}</td>
  <td><span class="badge badge-{{ run.status }}">{{ run.status }}</span></td>
  <td>{{ run.summary }}</td>
</tr>
{% else %}
<tr><td colspan="4">No runs yet.</td></tr>
{% endfor %}
