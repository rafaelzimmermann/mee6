{% extends "base.html" %}
{% block title %}History{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Run History <span class="live-dot" title="Auto-updating every 10s"></span></h1>
</div>
<div class="card">
  <table>
    <thead>
      <tr>
        <th>Pipeline</th>
        <th>Timestamp</th>
        <th>Status</th>
        <th>Summary</th>
      </tr>
    </thead>
    <tbody id="history-rows"
           hx-get="/history/rows"
           hx-trigger="every 10s"
           hx-swap="innerHTML">
      {% include "_history_rows.html" %}
    </tbody>
  </table>
</div>
{% endblock %}
