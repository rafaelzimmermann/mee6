{% for field in fields %}
<label class="field-label">
  {{ field.label }}
  {% if field.field_type == "textarea" %}
  <textarea
    name="{{ field.name }}"
    id="field-{{ step_index }}-{{ field.name }}"
    placeholder="{{ field.placeholder }}"
    {% if field.required %}required{% endif %}
  >{{ config.get(field.name, '') }}</textarea>
  {% if placeholder_hints is defined %}
  <span class="field-hint">Placeholders: {% for p in placeholder_hints %}<code>{{ p }}</code>{% if not loop.last %} {% endif %}{% endfor %}</span>
  {% endif %}
  {% elif field.field_type == "select" %}
  <select
    name="{{ field.name }}"
    id="field-{{ step_index }}-{{ field.name }}"
    {% if field.required %}required{% endif %}
  >
    {% for opt in field.options %}
    <option value="{{ opt }}"{% if config.get(field.name, field.options[0]) == opt %} selected{% endif %}>{{ opt }}</option>
    {% endfor %}
  </select>
  {% elif field.field_type == "group_select" %}
  {# options encoded as "name||jid" — stored value is the JID #}
  <select
    name="{{ field.name }}"
    id="field-{{ step_index }}-{{ field.name }}"
    {% if field.required %}required{% endif %}
    onchange="(function(s){var o=s.options[s.selectedIndex];var h=document.getElementById('ghint-{{ step_index }}-{{ field.name }}');if(h)h.textContent=o?o.dataset.hint:''})(this)"
  >
    <option value="">— select group —</option>
    {% for opt in field.options %}
      {% set parts = opt.split('||', 1) %}
      {% set jid = parts[1] if parts|length > 1 else parts[0] %}
      <option
        value="{{ jid }}"
        data-hint="{{ jid }}"
        {% if config.get(field.name, '') == jid %} selected{% endif %}
      >{{ parts[0] }}</option>
    {% endfor %}
  </select>
  <span class="field-hint" id="ghint-{{ step_index }}-{{ field.name }}">
    {% for opt in field.options %}
      {% set parts = opt.split('||', 1) %}
      {% set jid = parts[1] if parts|length > 1 else parts[0] %}
      {% if config.get(field.name, '') == jid %}{{ jid }}{% endif %}
    {% endfor %}
  </span>
  {% elif field.field_type == "calendar_select" %}
  {# options encoded as "Label||calendar_id" — value stored is the label #}
  <select
    name="{{ field.name }}"
    id="field-{{ step_index }}-{{ field.name }}"
    {% if field.required %}required{% endif %}
    onchange="(function(s){var o=s.options[s.selectedIndex];var h=document.getElementById('calid-hint-{{ step_index }}-{{ field.name }}');if(h)h.textContent=o?o.dataset.calid:''})(this)"
  >
    <option value="">— select calendar —</option>
    {% for opt in field.options %}
      {% set parts = opt.split('||', 1) %}
      <option
        value="{{ parts[0] }}"
        data-calid="{{ parts[1] if parts|length > 1 else '' }}"
        {% if config.get(field.name, '') == parts[0] %} selected{% endif %}
      >{{ parts[0] }}</option>
    {% endfor %}
  </select>
  <span class="field-hint" id="calid-hint-{{ step_index }}-{{ field.name }}">
    {% for opt in field.options %}
      {% set parts = opt.split('||', 1) %}
      {% if config.get(field.name, '') == parts[0] %}{{ parts[1] if parts|length > 1 else '' }}{% endif %}
    {% endfor %}
  </span>
  {% elif field.field_type == "combobox" %}
  <input
    type="text"
    list="dl-{{ step_index }}-{{ field.name }}"
    name="{{ field.name }}"
    id="field-{{ step_index }}-{{ field.name }}"
    placeholder="{{ field.placeholder }}"
    value="{{ config.get(field.name, '') }}"
    {% if field.required %}required{% endif %}
  >
  <datalist id="dl-{{ step_index }}-{{ field.name }}">
    {% for opt in field.options %}<option value="{{ opt }}">{% endfor %}
  </datalist>
  {% else %}
  <input
    type="{{ field.field_type }}"
    name="{{ field.name }}"
    id="field-{{ step_index }}-{{ field.name }}"
    placeholder="{{ field.placeholder }}"
    value="{{ config.get(field.name, '') }}"
    {% if field.required %}required{% endif %}
  >
  {% endif %}
</label>
{% endfor %}
