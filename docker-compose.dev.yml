services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  rails:
    environment:
      RAILS_ENV: development
    volumes:
      - ./rails:/app
      - /app/vendor/bundle
      - /app/node_modules
    command: bundle exec rails server -b 0.0.0.0

  whatsapp:
    environment:
      RAILS_BASE_URL: http://host.docker.internal:3000
    volumes:
      - ./services/whatsapp:/app
      - whatsapp_data_dev:/data/whatsapp

  agents:
    volumes:
      - ./services/agents:/app
      - ${GOOGLE_CREDENTIALS_PATH:-/dev/null}:/run/secrets/google_credentials.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  whatsapp_data_dev:
