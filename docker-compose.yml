services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mee6
      POSTGRES_PASSWORD: mee6
      POSTGRES_DB: mee6
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mee6"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11435:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "phi4:14b"]
    restart: "no"

  mee6:
    build: .
    env_file:
      - path: ~/.config/agntrick/.env        # global: API keys, Ollama URL
        required: true
      - path: ~/.config/agntrick/.mee6.conf  # project config in shared config dir
        required: false
      - path: .mee6.conf                     # project config in repo root (local override)
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://mee6:mee6@postgres:5432/mee6
      OLLAMA_BASE_URL: http://ollama:11434
      ANONYMIZED_TELEMETRY: "false"
    ports:
      - "8080:8080"
    volumes:
      - ~/.config/agntrick:/home/mee6/.config/agntrick      # whatsapp.yaml, .agntrick.yaml, .mee6.conf
      - mee6_storage:/home/mee6/storage                     # WhatsApp session + other runtime state
      - ./data:/app/data                                    # credentials.json, browser profiles, etc.
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./mee6/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./mee6/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api/v1
    command: npm run dev
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data:/usr/share/nginx/html:ro
    depends_on:
      - mee6
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  mee6_storage:
  ollama_data:
