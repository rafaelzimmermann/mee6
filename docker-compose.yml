services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mee6_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mee6_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    networks:
      - mee6_network

  rails:
    build:
      context: ./rails
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mee6_production
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_ENV: production
      RAILS_BASE_URL: http://rails:80
      AGENT_SERVICE_SECRET: ${AGENT_SERVICE_SECRET}
      WHATSAPP_SERVICE_SECRET: ${WHATSAPP_SERVICE_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      SIDEKIQ_WEB_USER: ${SIDEKIQ_WEB_USER}
      SIDEKIQ_WEB_PASSWORD: ${SIDEKIQ_WEB_PASSWORD}
      AGENT_SERVICE_URL: http://agents:8001
      WHATSAPP_SERVICE_URL: http://whatsapp:8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3000:80"
    networks:
      - mee6_network

  whatsapp:
    build:
      context: ./services/whatsapp
      dockerfile: Dockerfile
    environment:
      STORAGE_PATH: /data/whatsapp
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      WHATSAPP_SERVICE_SECRET: ${WHATSAPP_SERVICE_SECRET}
      RAILS_BASE_URL: http://rails:80
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mee6_production
    depends_on:
      postgres:
        condition: service_healthy
      rails:
        condition: service_started
    volumes:
      - whatsapp_data:/data/whatsapp
    networks:
      - mee6_network
    ports:
      - "8002:8002"

  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: 0.0.0.0:11435
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - mee6_network
    ports:
      - "11435:11435"
    entrypoint: >
      sh -c "ollama serve &
             until ollama list > /dev/null 2>&1; do sleep 1; done &&
             ollama pull phi4:14b &&
             wait"

  agents:
    build:
      context: ./services/agents
      dockerfile: Dockerfile
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      AGENT_SERVICE_SECRET: ${AGENT_SERVICE_SECRET}
      GOOGLE_CREDENTIALS_PATH: /run/secrets/google_credentials.json
      OLLAMA_BASE_URL: http://ollama:11435
    volumes:
      - ${GOOGLE_CREDENTIALS_PATH}:/run/secrets/google_credentials.json:ro
    networks:
      - mee6_network
    ports:
      - "8001:8001"

volumes:
  postgres_data:
  redis_data:
  whatsapp_data:
  ollama_data:

networks:
  mee6_network:
    driver: bridge
